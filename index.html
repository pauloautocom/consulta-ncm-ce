<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Fiscal Inteligente - CE</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input { width:100%; padding:12px; margin-top:10px; }
.item { padding:12px; border-bottom:1px solid #ddd; }
.badge { background:#2563eb; color:#fff; padding:4px 8px; border-radius:6px; font-size:12px; margin-right:5px; }
.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="card">
<h2>Consulta Fiscal Inteligente - CE</h2>

<input id="busca" placeholder="Digite produto ou NCM">

<div id="status" class="small">Carregando base...</div>
<div id="resultado"></div>
</div>

<script>

let tabelaNCM = [];
let regrasCE = [];

// =========================
// NORMALIZAR TEXTO (remove acento)
function normalizar(txt){
  return txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// =========================
// LIMPAR NCM
function limparNCM(n){
  return String(n).replace(/\D/g,"").padStart(8,"0");
}

// =========================
// CARREGAR DADOS
async function carregarDados(){

  const status = document.getElementById("status");

  try {
    const resNCM = await fetch("tabelancm.json");
    const jsonNCM = await resNCM.json();

    tabelaNCM = jsonNCM.map(p => ({
      ncm: limparNCM(p.ncm || p.codigo || ""),
      descricao: p.descricao || "",
      descBusca: normalizar(p.descricao || "")
    }));

    status.innerHTML = "Base NCM: " + tabelaNCM.length;

  } catch(e){
    status.innerHTML = "Erro ao carregar NCM";
    console.error(e);
  }

  try {
    const resRegras = await fetch("regras_ce.json");
    const jsonRegras = await resRegras.json();

    regrasCE = jsonRegras.map(r => ({
      ncm: String(r.ncm).replace(/\D/g,""),
      cclass: r.cclass,
      cst: r.cst
    }));

    status.innerHTML += " | Regras: " + regrasCE.length;

  } catch(e){
    status.innerHTML += " | Erro regras";
    console.error(e);
  }

}

// =========================
// CLASSIFICAÇÃO
function classificar(ncm){

  ncm = limparNCM(ncm);

  let regrasOrdenadas = [...regrasCE].sort((a,b)=>b.ncm.length - a.ncm.length);

  for(let r of regrasOrdenadas){
    if(ncm.startsWith(r.ncm)){
      return r;
    }
  }

  return { cclass:"000001", cst:"000" };
}

// =========================
// BUSCA INTELIGENTE
function buscar(){

  const textoOriginal = document.getElementById("busca").value.trim();
  const texto = normalizar(textoOriginal);
  const res = document.getElementById("resultado");

  res.innerHTML = "";

  if(texto.length < 2) return;

  const buscaNCM = textoOriginal.replace(/\D/g,"");

  let encontrados = [];

  for(let p of tabelaNCM){

    let score = 0;

    if(buscaNCM && p.ncm.startsWith(buscaNCM)) score += 200;

    if(p.descBusca.startsWith(texto)) score += 100;

    if(p.descBusca.includes(" " + texto)) score += 50;

    if(p.descBusca.includes(texto)) score += 10;

    if(score > 0){
      encontrados.push({ ...p, score });
    }

  }

  encontrados.sort((a,b)=>b.score - a.score);

  if(encontrados.length === 0){
    res.innerHTML = "<div class='small'>Nenhum produto encontrado</div>";
    return;
  }

  encontrados.slice(0,30).forEach(p => {

    const trib = classificar(p.ncm);

    res.innerHTML += `
      <div class="item">
        <b>${p.descricao}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
      </div>
    `;
  });
}

document.getElementById("busca").addEventListener("input", buscar);

carregarDados();

</script>

</body>
</html>
