<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta NCM e Classificação Tributária</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card {
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}
.item {
  padding:12px;
  border-bottom:1px solid #ddd;
}
.badge {
  background:#2563eb;
  color:#fff;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-right:6px;
}
.small { font-size:12px; color:#555; }
.erro { color:red; margin-top:15px; }
</style>
</head>

<body>

<div class="card">
<h2>Consulta Fiscal Inteligente</h2>

<input id="busca" placeholder="Digite produto ou NCM (água, café, ovo, 22011000)">

<select id="operacao">
  <option value="normal">Venda normal</option>
  <option value="isento">Isento</option>
  <option value="exportacao">Exportação</option>
</select>

<div id="resultado"></div>
<div id="erro" class="erro"></div>
</div>

<script>

// ========================
// BASE DE PRODUTOS (AJUSTADA)
// ========================
const baseProdutos = [
  { termos:["agua","agua mineral"], ncm:"22011000", desc:"Água mineral" },
  { termos:["refrigerante"], ncm:"22021000", desc:"Refrigerante" },
  { termos:["cafe","café"], ncm:"09011110", desc:"Café" },
  { termos:["arroz"], ncm:"10063021", desc:"Arroz" },
  { termos:["feijao","feijão"], ncm:"07133329", desc:"Feijão" },
  { termos:["ovo","ovos"], ncm:"04072100", desc:"Ovos de galinha" }
];

// ========================
// NORMALIZAR TEXTO
// ========================
function norm(t){
  return t.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

// ========================
// FORMATAR NCM
// ========================
function formatarNCM(n){
  return String(n).replace(/\D/g,"").padStart(8,"0");
}

// ========================
// CLASSIFICAÇÃO CORRETA
// ========================
function classificar(ncm, op){

  // EXPORTAÇÃO
  if(op === "exportacao"){
    return { cclass:"410004", cst:"410", desc:"Exportação" };
  }

  // ISENTO
  if(op === "isento"){
    return { cclass:"040001", cst:"040", desc:"Isento" };
  }

  // OVOS (REGRA CORRETA)
  if(ncm.startsWith("0407")){
    return { cclass:"200014", cst:"200", desc:"Cesta básica - ovos" };
  }

  // BEBIDAS (água, refri)
  if(ncm.startsWith("22")){
    return { cclass:"000001", cst:"000", desc:"Tributação normal" };
  }

  // ALIMENTOS GERAIS
  if(ncm.startsWith("07") || ncm.startsWith("10")){
    return { cclass:"000001", cst:"000", desc:"Tributação normal" };
  }

  // PADRÃO
  return { cclass:"000001", cst:"000", desc:"Tributação integral" };
}

// ========================
// BUSCA
// ========================
function buscar(){

  const texto = document.getElementById("busca").value.trim();
  const termo = norm(texto);
  const op = document.getElementById("operacao").value;
  const res = document.getElementById("resultado");
  const erro = document.getElementById("erro");

  res.innerHTML = "";
  erro.innerHTML = "";

  if(termo.length < 2) return;

  const ncmBusca = texto.replace(/\D/g,"");

  let resultados = [];

  baseProdutos.forEach(p => {

    const ncm = formatarNCM(p.ncm);

    // busca por NCM
    if(ncmBusca && ncm.startsWith(ncmBusca)){
      resultados.push(p);
      return;
    }

    // busca por nome
    if(p.termos.some(t => termo.includes(norm(t)))){
      resultados.push(p);
    }

  });

  if(resultados.length === 0){
    erro.innerHTML = "Produto não encontrado";
    return;
  }

  resultados.forEach(p => {

    const ncm = formatarNCM(p.ncm);
    const trib = classificar(ncm, op);

    res.innerHTML += `
      <div class="item">
        <b>${p.desc}</b><br>
        NCM: ${ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
        <div class="small">${trib.desc}</div>
      </div>
    `;
  });
}

// ========================
document.getElementById("busca").addEventListener("input", buscar);
document.getElementById("operacao").addEventListener("change", buscar);

</script>

</body>
</html>
