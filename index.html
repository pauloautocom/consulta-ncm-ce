<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Fiscal CE</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input { width:100%; padding:12px; margin-top:10px; }
.item { padding:12px; border-bottom:1px solid #ddd; }
.badge { background:#2563eb; color:#fff; padding:4px 8px; border-radius:6px; font-size:12px; margin-right:5px; }
</style>
</head>

<body>

<div class="card">
<h2>Consulta Fiscal Inteligente - CE</h2>

<input id="busca" placeholder="Digite produto ou NCM">

<div id="resultado"></div>
</div>

<script>

let tabelaNCM = [];
let regrasCE = [];

// 🔥 CARREGAMENTO
Promise.all([
  fetch("tabelancm.json").then(r=>r.json()),
  fetch("regras_ce.json").then(r=>r.json())
]).then(([ncm, regras])=>{
  tabelaNCM = ncm;
  regrasCE = regras.map(r => ({
    ...r,
    ncm: limparNCM(r.ncm)
  }));
});

// 🔥 NORMALIZAÇÃO CORRETA
function limparNCM(n){
  return String(n).replace(/\D/g,"").padStart(8,"0");
}

// 🔥 CLASSIFICAÇÃO CORRIGIDA
function classificar(ncm){

  ncm = limparNCM(ncm);

  let regrasOrdenadas = [...regrasCE].sort((a,b)=>b.ncm.length - a.ncm.length);

  for(let r of regrasOrdenadas){
    if(ncm.startsWith(r.ncm)){
      return r;
    }
  }

  return { cclass:"000001", cst:"000" };
}

// 🔎 BUSCA
function buscar(){

  const texto = document.getElementById("busca").value.trim().toLowerCase();
  const res = document.getElementById("resultado");

  res.innerHTML = "";
  if(texto.length < 2) return;

  const buscaNCM = texto.replace(/\D/g,"");

  let resultados = [];

  tabelaNCM.forEach(p => {

    const ncm = limparNCM(p.ncm || p.codigo);
    const desc = (p.descricao || "").toLowerCase();

    let match = false;

    if(buscaNCM && ncm.startsWith(buscaNCM)) match = true;
    if(desc.includes(texto)) match = true;

    if(match){
      resultados.push({ ncm, descricao:p.descricao });
    }

  });

  resultados.slice(0,30).forEach(p => {

    const trib = classificar(p.ncm);

    res.innerHTML += `
      <div class="item">
        <b>${p.descricao}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
      </div>
    `;
  });
}

document.getElementById("busca").addEventListener("input", buscar);

</script>

</body>
</html>
