<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Motor Tributário Inteligente – CE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#f4f6f8; padding:15px; }
.card {
  max-width:900px; margin:auto; background:#fff;
  padding:20px; border-radius:10px;
}
input, select {
  width:100%; padding:12px; margin-top:10px;
}
.item {
  padding:12px; border-bottom:1px solid #ddd;
}
.badge {
  background:#2563eb; color:#fff;
  padding:4px 8px; border-radius:6px;
  font-size:12px; margin-right:5px;
}
.small { font-size:12px; color:#555; }
</style>
</head>

<body>

<div class="card">
<h2>Motor Tributário Automático – Ceará</h2>

<input id="busca" placeholder="Digite produto ou NCM">

<select id="operacao">
  <option value="normal">Venda normal</option>
  <option value="exportacao">Exportação</option>
  <option value="isento">Isento</option>
</select>

<div id="resultado"></div>
</div>

<script>
let tabelaNCM = [];

fetch("tabelancm.json")
  .then(r => r.json())
  .then(d => tabelaNCM = d);

// ==========================
// MOTOR DE REGRAS INTELIGENTE
// ==========================
function classificarProduto(ncm, operacao){

  const cap = parseInt(ncm.substring(0,2));

  // 🔹 EXPORTAÇÃO (prioridade)
  if(operacao === "exportacao"){
    return { cclass:"410004", cst:"410", desc:"Exportação" };
  }

  // 🔹 ISENTO
  if(operacao === "isento"){
    return { cclass:"040001", cst:"040", desc:"Isento" };
  }

  // 🔹 BEBIDAS (NCM 22)
  if(cap === 22){
    return { cclass:"000020", cst:"000", desc:"Bebidas – Substituição Tributária" };
  }

  // 🔹 CESTA BÁSICA
  if(cap >= 1 && cap <= 21){
    return { cclass:"000030", cst:"010", desc:"Cesta básica / alimento essencial" };
  }

  // 🔹 ELETRÔNICOS
  if(cap === 84 || cap === 85){
    return { cclass:"000001", cst:"000", desc:"Tributação normal – eletrônicos" };
  }

  // 🔹 VESTUÁRIO
  if(cap >= 61 && cap <= 63){
    return { cclass:"000001", cst:"000", desc:"Tributação normal – vestuário" };
  }

  // 🔹 PADRÃO
  return { cclass:"000001", cst:"000", desc:"Tributação integral" };
}

// ==========================
function norm(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ==========================
function buscar(){
  const q = norm(document.getElementById("busca").value.trim());
  const op = document.getElementById("operacao").value;
  const res = document.getElementById("resultado");

  res.innerHTML = "";
  if(q.length < 2) return;

  let achados = [];

  tabelaNCM.forEach(p => {
    const ncm = String(p.ncm || p.codigo || "").replace(/\D/g,"");
    const desc = norm(p.descricao || "");

    if(ncm.startsWith(q) || desc.includes(q)){
      achados.push({ nome:p.descricao, ncm });
    }
  });

  if(achados.length === 0){
    res.innerHTML = "<p>Nenhum resultado encontrado</p>";
    return;
  }

  achados.slice(0,25).forEach(p => {

    const trib = classificarProduto(p.ncm, op);

    res.innerHTML += `
      <div class="item">
        <b>${p.nome}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
        <div class="small">${trib.desc}</div>
      </div>
    `;
  });
}

document.getElementById("busca").addEventListener("input", buscar);
document.getElementById("operacao").addEventListener("change", buscar);
</script>

</body>
</html>
