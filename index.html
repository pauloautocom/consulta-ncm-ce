<script>
// =====================
// CARREGA BASE
// =====================
let tabelaNCM = [];

fetch("tabelancm.json")
  .then(r => r.json())
  .then(d => {
    tabelaNCM = d.map(p => ({
      ncm: formatarNCM(p.ncm || p.codigo),
      descricao: p.descricao || ""
    }));
  });

// =====================
// FORMATAR NCM CORRETAMENTE (8 dígitos)
// =====================
function formatarNCM(ncm){
  return String(ncm).replace(/\D/g,"").padStart(8,"0");
}

// =====================
// NORMALIZA TEXTO
// =====================
function norm(txt){
  return txt
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/s\b/g,"") // remove plural simples
    .trim();
}

// =====================
// MOTOR TRIBUTÁRIO (mantido)
// =====================
function classificarProduto(ncm, op){

  const cap = parseInt(ncm.substring(0,2));

  if(op === "exportacao")
    return { cclass:"410004", cst:"410", desc:"Exportação" };

  if(op === "isento")
    return { cclass:"040001", cst:"040", desc:"Isento" };

  if(cap === 22)
    return { cclass:"000020", cst:"000", desc:"Bebidas – ST" };

  if(cap >= 1 && cap <= 21)
    return { cclass:"000030", cst:"010", desc:"Alimentos / cesta básica" };

  if(cap === 84 || cap === 85)
    return { cclass:"000001", cst:"000", desc:"Eletrônicos" };

  return { cclass:"000001", cst:"000", desc:"Tributação normal" };
}

// =====================
// BUSCA CORRIGIDA
// =====================
function buscar(){

  const qOriginal = document.getElementById("busca").value.trim();
  const q = norm(qOriginal);
  const op = document.getElementById("operacao").value;
  const res = document.getElementById("resultado");

  res.innerHTML = "";

  if(q.length < 2) return;

  const qNCM = qOriginal.replace(/\D/g,"").padStart(8,"0");

  let resultados = [];

  tabelaNCM.forEach(p => {

    const desc = norm(p.descricao);

    // 🔹 busca por NCM (corrigida)
    if(p.ncm.startsWith(qNCM)){
      resultados.push(p);
      return;
    }

    // 🔹 busca por nome (corrigida)
    if(desc.includes(q)){
      resultados.push(p);
    }

  });

  if(resultados.length === 0){
    res.innerHTML = "<p>Nenhum resultado encontrado</p>";
    return;
  }

  resultados.slice(0,25).forEach(p => {

    const trib = classificarProduto(p.ncm, op);

    res.innerHTML += `
      <div class="item">
        <b>${p.descricao}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
        <div class="small">${trib.desc}</div>
      </div>
    `;
  });
}

// =====================
document.getElementById("busca").addEventListener("input", buscar);
document.getElementById("operacao").addEventListener("change", buscar);
</script>
