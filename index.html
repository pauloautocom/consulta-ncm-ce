<script>
// ========================
// BASE NCM (continua igual)
// ========================
let tabelaNCM = [];

fetch("tabelancm.json")
  .then(r => r.json())
  .then(d => tabelaNCM = d);

// ========================
// CLASSIFICAÇÃO TRIBUTÁRIA REAL (SVRS)
// ========================
const cclassTribTabela = [
  { codigo:"000001", cst:"000", desc:"Tributação integral" },
  { codigo:"410004", cst:"410", desc:"Exportação" },
  { codigo:"510001", cst:"510", desc:"Diferimento" },
  { codigo:"550001", cst:"550", desc:"Suspensão" },
  { codigo:"620001", cst:"620", desc:"Monofásico combustíveis" }
];

// ========================
function norm(t){
  return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

// ========================
document.getElementById("busca").addEventListener("input", e => {
  const q = norm(e.target.value.trim());
  const res = document.getElementById("resultado");
  res.innerHTML = "";
  if(q.length < 2) return;

  let achados = [];

  tabelaNCM.forEach(p => {
    const ncm = String(p.ncm || p.codigo || "").replace(/\D/g,"");
    const desc = norm(p.descricao || "");

    if(ncm.startsWith(q) || desc.includes(q)){
      achados.push({ nome:p.descricao, ncm });
    }
  });

  if(achados.length === 0){
    res.innerHTML = "<p>Nenhum resultado encontrado</p>";
    return;
  }

  achados.slice(0,20).forEach(p => {

    // 🔹 PADRÃO: tributação normal
    const trib = cclassTribTabela[0];

    res.innerHTML += `
      <div class="item">
        <b>${p.nome}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.codigo}</span>
        <span class="badge">CST: ${trib.cst}</span>
        <div class="small">${trib.desc}</div>
      </div>
    `;
  });
});
</script>
