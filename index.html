<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Fiscal CE</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input { width:100%; padding:12px; margin-top:10px; }
.item { padding:12px; border-bottom:1px solid #ddd; }
.badge { background:#2563eb; color:#fff; padding:4px 8px; border-radius:6px; font-size:12px; margin-right:5px; }
.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="card">
<h2>Consulta Fiscal Inteligente - CE</h2>

<input id="busca" placeholder="Digite produto ou NCM">

<div id="resultado"></div>
</div>

<script>

let tabelaNCM = [];
let regrasCE = [];

// 🔥 CARREGAMENTO ROBUSTO
Promise.all([
  fetch("tabelancm.json").then(r=>r.json()),
  fetch("regras_ce.json").then(r=>r.json())
]).then(([ncm, regras])=>{

  // 🔥 ACEITA QUALQUER FORMATO DE NCM
  tabelaNCM = ncm.map(p => ({
    ncm: limparNCM(p.ncm || p.codigo || ""),
    descricao: p.descricao || p.descricao_completa || "SEM DESCRIÇÃO"
  }));

  regrasCE = regras.map(r => ({
    ncm: limparNCM(r.ncm),
    cclass: r.cclass,
    cst: r.cst
  }));

});

// 🔧 NORMALIZA NCM
function limparNCM(n){
  return String(n).replace(/\D/g,"").padStart(8,"0");
}

// 🔥 CLASSIFICAÇÃO CORRETA
function classificar(ncm){

  ncm = limparNCM(ncm);

  let regrasOrdenadas = [...regrasCE].sort((a,b)=>b.ncm.length - a.ncm.length);

  for(let r of regrasOrdenadas){
    if(ncm.startsWith(r.ncm)){
      return r;
    }
  }

  return { cclass:"000001", cst:"000" };
}

// 🔎 BUSCA INTELIGENTE
function buscar(){

  const texto = document.getElementById("busca").value.trim().toLowerCase();
  const res = document.getElementById("resultado");

  res.innerHTML = "";
  if(texto.length < 2) return;

  const buscaNCM = texto.replace(/\D/g,"");

  let resultados = [];

  tabelaNCM.forEach(p => {

    const desc = p.descricao.toLowerCase();

    let score = 0;

    // 🔥 BUSCA POR NCM
    if(buscaNCM && p.ncm.startsWith(buscaNCM)) score += 100;

    // 🔥 BUSCA POR TEXTO FLEXÍVEL
    if(desc.includes(texto)) score += 60;

    // 🔥 SINÔNIMOS IMPORTANTES
    if(texto.includes("agua") && desc.includes("mineral")) score += 80;
    if(texto.includes("cafe") && desc.includes("cafe")) score += 80;
    if(texto.includes("macarrao") && desc.includes("massa")) score += 80;
    if(texto.includes("jornal") && desc.includes("periodic")) score += 80;

    if(score > 0){
      resultados.push({ ...p, score });
    }

  });

  resultados.sort((a,b)=>b.score - a.score);

  if(resultados.length === 0){
    res.innerHTML = "<div class='small'>Nenhum produto encontrado</div>";
    return;
  }

  resultados.slice(0,30).forEach(p => {

    const trib = classificar(p.ncm);

    res.innerHTML += `
      <div class="item">
        <b>${p.descricao}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
      </div>
    `;
  });
}

document.getElementById("busca").addEventListener("input", buscar);

</script>

</body>
</html>
