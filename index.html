<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consulta NCM + Classificação Tributária</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:15px;
}
.card {
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}
h1 { font-size:20px; }
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:16px;
}
.item {
  padding:12px;
  border-bottom:1px solid #ddd;
}
.badge {
  background:#2563eb;
  color:#fff;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  margin-right:6px;
}
.small {
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="card">
<h1>Consulta Fiscal Inteligente</h1>

<input id="busca" placeholder="Digite produto ou NCM (ex: água, café, 09011110)">

<select id="operacao">
  <option value="normal">Venda normal</option>
  <option value="isento">Isento</option>
  <option value="exportacao">Exportação</option>
  <option value="diferimento">Diferimento</option>
</select>

<div id="resultado"></div>
</div>

<script>
// ========================
// CARREGAR BASE NCM
// ========================
let tabelaNCM = [];

fetch("tabelancm.json")
  .then(r => r.json())
  .then(d => {
    tabelaNCM = d.map(p => ({
      ncm: formatarNCM(p.ncm || p.codigo),
      descricao: p.descricao || ""
    }));
  })
  .catch(() => console.warn("Erro ao carregar tabelancm.json"));

// ========================
// FORMATAR NCM (8 dígitos)
// ========================
function formatarNCM(ncm){
  return String(ncm).replace(/\D/g,"").padStart(8,"0");
}

// ========================
// NORMALIZAR TEXTO
// ========================
function norm(txt){
  return txt
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/s\b/g,"") // remove plural simples
    .trim();
}

// ========================
// MOTOR TRIBUTÁRIO CORRETO
// ========================
function classificarProduto(ncm, operacao){

  const cap = parseInt(ncm.substring(0,2));

  // prioridade operação
  if(operacao === "exportacao")
    return { cclass:"410004", cst:"410", desc:"Exportação" };

  if(operacao === "isento")
    return { cclass:"040001", cst:"040", desc:"Isento" };

  if(operacao === "diferimento")
    return { cclass:"510001", cst:"510", desc:"Diferimento" };

  // regras por produto (automáticas)
  if(cap === 22)
    return { cclass:"000020", cst:"000", desc:"Bebidas – ST" };

  if(cap >= 1 && cap <= 21)
    return { cclass:"000030", cst:"010", desc:"Alimentos / cesta básica" };

  if(cap === 84 || cap === 85)
    return { cclass:"000001", cst:"000", desc:"Eletrônicos" };

  if(cap >= 61 && cap <= 63)
    return { cclass:"000001", cst:"000", desc:"Vestuário" };

  // padrão
  return { cclass:"000001", cst:"000", desc:"Tributação integral" };
}

// ========================
// BUSCA PRINCIPAL
// ========================
function buscar(){

  const texto = document.getElementById("busca").value.trim();
  const q = norm(texto);
  const op = document.getElementById("operacao").value;
  const res = document.getElementById("resultado");

  res.innerHTML = "";

  if(q.length < 2) return;

  const qNCM = texto.replace(/\D/g,"").padStart(8,"0");

  let resultados = [];

  tabelaNCM.forEach(p => {

    const desc = norm(p.descricao);

    // busca por NCM (corrigida)
    if(p.ncm.startsWith(qNCM)){
      resultados.push(p);
      return;
    }

    // busca por nome (corrigida)
    if(desc.includes(q)){
      resultados.push(p);
    }

  });

  if(resultados.length === 0){
    res.innerHTML = "<p>Nenhum resultado encontrado</p>";
    return;
  }

  resultados.slice(0,25).forEach(p => {

    const trib = classificarProduto(p.ncm, op);

    res.innerHTML += `
      <div class="item">
        <b>${p.descricao}</b><br>
        NCM: ${p.ncm}<br>
        <span class="badge">CClassTrib: ${trib.cclass}</span>
        <span class="badge">CST: ${trib.cst}</span>
        <div class="small">${trib.desc}</div>
      </div>
    `;
  });
}

// ========================
document.getElementById("busca").addEventListener("input", buscar);
document.getElementById("operacao").addEventListener("change", buscar);
</script>

</body>
</html>
